schema_version: 1

context:
  name: sphinxcontrib-httpdomain
  version: 2.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 9e4e8733bf41ee4d9d5f9eb4dbf3cc2c22a665221ba42c5c3ae181b98af8855d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - sphinx >=6.0
tests:
  - python:
      imports:
        - sphinxcontrib
      python_version: ${{ python_min }}.*
about:
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Sphinx domain for describing HTTP APIs
  description: |
    This contrib extension, `sphinxcontrib.httpdomain¡, provides a Sphinx domain
    for describing HTTP APIs.
  homepage: https://github.com/sphinx-contrib/httpdomain
  repository: https://github.com/sphinx-contrib/httpdomain
  documentation: https://sphinxcontrib-httpdomain.readthedocs.io/en/stable/

extra:
  recipe-maintainers:
    - conda-forge/sphinx
    - carlodri
